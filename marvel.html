<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Marvel Champions — Companion de Jeu</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Surcharge thème Marvel */
    :root {
      --accent:       #e23636;
      --accent-light: #fff5f5;
      --green:        #2563eb;
      --green-bg:     #eff6ff;
      --green-border: #bfdbfe;
      --green-text:   #1e3a8a;
    }
    .counter-value.warning   { color: #d97706; }
    .counter-value.danger    { color: #e23636; }
    header { border-bottom-color: #fca5a5; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="back-btn" ontouchstart="" title="Accueil">←</a>
      <div class="ring-icon">🛡️</div>
      <div class="header-title">
        <h1>Marvel Champions</h1>
        <p class="subtitle">Le Jeu de Cartes</p>
      </div>

    </div>
  </header>

  <main>
    <div class="round-indicator">
      <button class="round-btn" ontouchstart="" onclick="changeRound(-1)">‹</button>
      <span>Tour <span id="roundNum">1</span></span>
      <button class="round-btn" ontouchstart="" onclick="changeRound(1)">›</button>
    </div>

    <div class="phases-container" id="phasesContainer"></div>
  </main>

  <script src="marvel-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
